services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-franclean}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-franclean_secret}
      POSTGRES_DB: ${POSTGRES_DB:-franclean_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-franclean} -d ${POSTGRES_DB:-franclean_db}"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-franclean}:${POSTGRES_PASSWORD:-franclean_secret}@postgres:5432/${POSTGRES_DB:-franclean_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_please}
      PORT: 3000
    ports:
      - "${API_PORT:-3000}:3000"

volumes:
  pgdata:
