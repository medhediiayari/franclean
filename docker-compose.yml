services:
  postgres:
    image: postgres:16-alpine
    container_name: franclean-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-franclean}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-franclean_secret}
      POSTGRES_DB: ${POSTGRES_DB:-franclean_db}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-franclean} -d ${POSTGRES_DB:-franclean_db}"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: franclean-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-franclean}:${POSTGRES_PASSWORD:-franclean_secret}@postgres:5432/${POSTGRES_DB:-franclean_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_please}
      PORT: 3000
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BCi2MiUqC0f4a4jEmy4FjPARQckHPnfSNef7klKbFqHJW09GDs26WHWm5n_ockigkLZvNAII5U9M2eKEYdPf77w}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-BOdCODQk39JZ51Yt_JaCAYIb3Hm1H6Phme3gOULIAYA}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:notif.bipbip@gmail.com}
    volumes:
      - ./public:/app/public-assets
    # No external port - accessed via nginx internally

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: franclean-frontend
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${FRONTEND_PORT:-8081}:80"

volumes:
  pgdata:
