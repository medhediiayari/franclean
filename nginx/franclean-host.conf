# Nginx host configuration for franclean.castpro-tn.com
# Copy this file to /etc/nginx/sites-available/franclean on the VPS
# Then: sudo ln -s /etc/nginx/sites-available/franclean /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name franclean.castpro-tn.com;

    # Max upload size (for photos, etc.)
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# After setting up, run certbot for HTTPS:
# sudo certbot --nginx -d franclean.castpro-tn.com
